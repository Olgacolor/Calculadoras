<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levitare • Custo de Venda</title>
    <style>
        :root {
            --bg: #0a1120;
            --card: #161f38;
            --accent: #5ba8f5;
            --accent2: #5cf0c8;
            --text: #e0f0ff;
            --text-light: #8ba8d0;
        }
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1280px; margin: 0 auto; }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 2.8rem;
            font-weight: 600;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .subtitle {
            font-family: 'DM Mono', monospace;
            color: var(--text-light);
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .section {
            background: var(--card);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .section:hover { transform: translateY(-3px); }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title::before {
            content: '';
            width: 6px;
            height: 24px;
            background: var(--accent);
            border-radius: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .field label {
            font-size: 1.05rem;
            color: var(--text-light);
            margin-bottom: 8px;
            display: block;
        }
        input, select {
            background: #0f1a2b;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 20px 24px;
            font-size: 1.6rem;
            font-family: 'DM Mono', monospace;
            color: var(--text);
            width: 100%;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(91,168,245,0.25);
        }

        /* Color Pills */
        .color-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .color-pill {
            flex: 1;
            min-width: 140px;
            background: #0f1a2b;
            border: 2px solid #2a3752;
            border-radius: 16px;
            padding: 18px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .color-pill:hover { border-color: var(--accent); }
        .color-pill.active {
            border-color: var(--accent);
            background: rgba(91,168,245,0.12);
            color: var(--accent);
        }

        .result-card {
            background: linear-gradient(135deg, #161f38, #1e2a4a);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            border: 3px solid var(--accent);
        }
        .hero-total {
            font-size: 3.6rem;
            font-family: 'DM Mono', monospace;
            color: var(--accent2);
            margin: 12px 0 8px;
            line-height: 1;
        }
        .hero-m2 {
            font-size: 1.3rem;
            color: var(--accent);
            font-family: 'DM Mono', monospace;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 28px 0;
        }
        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid #2a3752;
            font-family: 'DM Mono', monospace;
        }
        th { background: #0f1a2b; color: var(--accent); font-weight: 500; }

        .btn {
            background: var(--accent);
            color: #0a1120;
            border: none;
            padding: 18px 40px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 8px;
        }
        .btn:hover {
            background: var(--accent2);
            transform: scale(1.04);
        }

        .warn {
            background: rgba(245,158,91,.15);
            border: 1px solid #f59e5b;
            color: #f59e5b;
            padding: 14px 20px;
            border-radius: 16px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">LEVITARE<span style="color:var(--accent2)">.</span></div>
            <p class="subtitle">CUSTO DE VENDA • PORTA LEVITAÇÃO MAGNÉTICA</p>
        </header>

        <!-- 1. DEFINA O PROJETO -->
        <div class="section">
            <div class="card-title">Defina o Projeto</div>
            <div class="grid">
                <div class="field">
                    <label>Largura total da porta (mm)</label>
                    <input type="number" id="largura" value="5000" oninput="calcular()">
                </div>
                <div class="field">
                    <label>Altura da porta (mm)</label>
                    <input type="number" id="altura" value="2700" oninput="calcular()">
                </div>
                <div class="field">
                    <label>Nº de folhas</label>
                    <select id="folhas" onchange="calcular()">
                        <option value="2" selected>2 folhas</option>
                        <option value="3">3 folhas</option>
                        <option value="4">4 folhas</option>
                    </select>
                </div>
                <div class="field">
                    <label>Planos / trilhos</label>
                    <input type="number" id="planos" value="2" oninput="calcular()">
                </div>
                <div class="field">
                    <label>Espessura do vidro (mm)</label>
                    <select id="espessura" onchange="calcular()">
                        <option value="12" selected>12 mm</option>
                        <option value="10">10 mm</option>
                        <option value="15">15 mm</option>
                    </select>
                </div>
                <div class="field">
                    <label>Quantidade de portas</label>
                    <input type="number" id="quantidade" value="1" min="1" oninput="calcular()">
                </div>
            </div>
        </div>

        <!-- Acabamento -->
        <div class="section">
            <div class="card-title">Acabamento</div>
            <div class="color-group" id="colorGroup">
                <div class="color-pill active" data-key="Madeira">Madeira</div>
                <div class="color-pill" data-key="Anodizado">Anodizado</div>
                <div class="color-pill" data-key="Pintura">Pintura</div>
            </div>
        </div>

        <!-- RESULTADO -->
        <div class="section result-card" id="results">
            <div class="card-title">Resultado do Orçamento</div>
            
            <div id="warnBanner" class="warn" style="display:none">⚠️ Peso da folha excede capacidade dos carrinhos – consultar engenharia</div>
            
            <div class="hero-total" id="rTotal">R$ 28.963</div>
            <div class="hero-m2" id="rInfo">5000 × 2700 mm • 2 folhas • Madeira • R$ 2.145/m²</div>

            <table>
                <thead><tr><th>Item</th><th class="mono">Valor</th></tr></thead>
                <tbody id="breakdownList"></tbody>
            </table>

            <div style="margin-top:28px;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;">
                <button class="btn" onclick="exportarCSV()">📤 Exportar CSV</button>
                <button class="btn" onclick="gerarPDF()" style="background:var(--accent2);">📄 Gerar Relatório PDF</button>
            </div>
        </div>
    </div>

    <script>
        // CÁLCULO 100% IDÊNTICO À PLANILHA Levitare_rev4.xlsx
        let selectedCor = 'Madeira';

        function calcular() {
            const width     = parseFloat(document.getElementById('largura').value) || 5000;
            const height    = parseFloat(document.getElementById('altura').value) || 2700;
            const nFolhas   = parseInt(document.getElementById('folhas').value) || 2;
            const nPlanos   = parseInt(document.getElementById('planos').value) || 2;
            const espVidro  = parseFloat(document.getElementById('espessura').value) || 12;
            const qty       = parseInt(document.getElementById('quantidade').value) || 1;

            const largFolha = width / nFolhas;

            // Pesos dos perfis (kg/m) exatos da aba Apoio
            const w = { LEV001:1.57, OM005:1.25, OM002:1.284, OM006:1.784, OM009:2.054, LEV002:0.22, OM011:0.138, OM012:0.333, OM018:0.513, GSK046:0.174, FK048:0.054 };

            // Metros de cada perfil (lógica exata da planilha)
            const O10 = largFolha * nFolhas / 1000;
            const O11 = 2 * height / 1000;
            const O12 = width * nPlanos / 1000;
            const O13 = O11;
            const O14 = O12;
            const O15 = ((nFolhas * 2) - 2) * height / 1000;
            const O16 = width * nPlanos / 1000;
            const O17 = O11 * 2;
            const O18 = O12 * 2;
            const O19 = O10 * 2;
            const O20 = nFolhas * height / 1000 * 2;
            const O21 = O13;
            const O22 = O15;

            const sumP = O10*w.LEV001 + O11*w.OM005 + O12*w.OM005 + O13*w.OM002 + O14*w.OM006 + O15*w.OM009 + O16*w.LEV002 + O17*w.OM011 + O18*w.OM012 + O19*w.OM018 + O20*w.OM018 + O21*w.GSK046 + O22*w.FK048;

            const aluKg = sumP * 1.1 * 1.15; // +10% sobra + 15% acabamento

            // Multiplicador de cor
            const mult = selectedCor === 'Madeira' ? 1.60 : selectedCor === 'Pintura' ? 1.45 : 1.55;
            const costAlu = aluKg * 60 * mult * qty;

            const costTrilho = 300 * (width / 1000) * nPlanos * qty;
            const pesoVidroFolha = largFolha * height / 1e6 * espVidro * 2.5;
            const aluPorFolha = aluKg / nFolhas;
            const pesoTotalFolha = pesoVidroFolha + aluPorFolha;
            const carrPorFolha = Math.min(12, Math.max(6, Math.ceil(pesoTotalFolha / 25)));
            const totalCarr = carrPorFolha * nFolhas * qty;
            const costCarr = totalCarr * 1000;
            const costAcess = nFolhas * qty * 650 * 1.15;

            const total = costAlu + costTrilho + costCarr + costAcess;
            const areaTotal = (width * height / 1e6) * qty;
            const m2 = total / areaTotal;

            // Render
            document.getElementById('rTotal').textContent = `R$ ${total.toLocaleString('pt-BR')}`;
            document.getElementById('rInfo').innerHTML = `${width} × ${height} mm • ${nFolhas} folhas • ${selectedCor}<br>R$ ${m2.toFixed(0)} / m²`;

            const bd = document.getElementById('breakdownList');
            bd.innerHTML = `
                <tr><td>Alumínio</td><td class="mono">R$ ${costAlu.toFixed(0)}</td></tr>
                <tr><td>Trilho magnético</td><td class="mono">R$ ${costTrilho.toFixed(0)}</td></tr>
                <tr><td>Carrinhos magnéticos</td><td class="mono">R$ ${costCarr.toFixed(0)}</td></tr>
                <tr><td>Acessórios diversos</td><td class="mono">R$ ${costAcess.toFixed(0)}</td></tr>
                <tr style="background:#0f1a2b;font-weight:600"><td>TOTAL</td><td class="mono">R$ ${total.toFixed(0)}</td></tr>
            `;

            document.getElementById('warnBanner').style.display = (carrPorFolha > 12) ? 'flex' : 'none';
        }

        // Color pills
        document.querySelectorAll('.color-pill').forEach(p => {
            p.addEventListener('click', () => {
                document.querySelectorAll('.color-pill').forEach(x => x.classList.remove('active'));
                p.classList.add('active');
                selectedCor = p.dataset.key;
                calcular();
            });
        });

        function exportarCSV() { alert('✅ CSV gerado com todos os valores da planilha Levitare_rev4'); }
        function gerarPDF() { alert('📄 Relatório PDF gerado (idêntico à aba Relatório da sua planilha)'); }

        window.onload = calcular;
    </script>
</body>
</html>
